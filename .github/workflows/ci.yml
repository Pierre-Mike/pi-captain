name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type check
        run: bun run typecheck

  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Biome CI
        run: bunx biome ci extensions/ skills/

  line-limit:
    name: File Size Gate (≤ 200 lines)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Check file sizes
        run: |
          violations=$(find extensions skills -name "*.ts" ! -name "*.test.ts" | xargs wc -l 2>/dev/null | awk '$1 > 200 && $2 != "total"' | grep -v "node_modules" || true)
          if [ -n "$violations" ]; then
            echo "❌ Files exceeding 200 lines — split them (Basic_knowledge.md §Single Responsibility):"
            echo "$violations"
            exit 1
          fi
          echo "✅ All source files within 200-line limit"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: line-limit
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test extensions/

  coverage:
    name: Coverage Badges
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Parse coverage and update README badges
        run: |
          COVERAGE=$(bun test --coverage extensions/ 2>&1)
          LINES=$(echo "$COVERAGE" | grep "All files" | awk '{print $3}')
          BRANCHES=$(echo "$COVERAGE" | grep "All files" | awk '{print $4}')

          # Pick badge color based on percentage
          color() {
            local pct=$(echo "$1" | tr -d '%')
            if   (( $(echo "$pct >= 80" | bc -l) )); then echo "brightgreen"
            elif (( $(echo "$pct >= 60" | bc -l) )); then echo "yellow"
            else echo "red"
            fi
          }

          LINE_COLOR=$(color "$LINES")
          BRANCH_COLOR=$(color "$BRANCHES")

          LINE_ENCODED=$(echo "$LINES" | sed 's/%/%25/')
          BRANCH_ENCODED=$(echo "$BRANCHES" | sed 's/%/%25/')

          LINE_BADGE="![Lines](https://img.shields.io/badge/lines-${LINE_ENCODED}-${LINE_COLOR})"
          BRANCH_BADGE="![Branches](https://img.shields.io/badge/branches-${BRANCH_ENCODED}-${BRANCH_COLOR})"

          sed -i "s|!\[Lines\](https://img\.shields\.io/badge/lines-[^)]*)|${LINE_BADGE}|" README.md
          sed -i "s|!\[Branches\](https://img\.shields\.io/badge/branches-[^)]*)|${BRANCH_BADGE}|" README.md

          echo "Updated: lines=${LINES} (${LINE_COLOR}), branches=${BRANCHES} (${BRANCH_COLOR})"
      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update coverage badges [skip ci]" && git push)

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Audit
        run: bun audit || true
