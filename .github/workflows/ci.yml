name: CI

on:
  push:
    branches: [main]
  pull_request:

# ── Dependency graph ──────────────────────────────────────────────────────
#
#   ┌─ static-checks ─────────┐
#   │  (typecheck + layers)   │
#   └─────────────────────────┘
#   ┌─ lint ──────────────────┐    ┌─ structure ─────────────────┐
#   │  (biome)                ├──► │  (line-limit + co-located)  │
#   └─────────────────────────┘    └─────────────────────────────┘
#   ┌─ arch ──────────────────┐
#   │  (arch.test + depcruise)│
#   └─────────────────────────┘
#                  ▼ all three must pass
#            ┌─ test ──────────┐
#            │  (bun test + cov)│
#            └─────────────────┘
#                  ▼
#        ┌─ coverage ─┐  ┌─ audit ─┐
#        └────────────┘  └─────────┘
#
# static-checks, lint, arch all start immediately (no `needs`).
# structure waits only for lint (biome must pass first).
# test waits for all four quality gates.

jobs:
  # ── 1. Type checking (flat + layer boundaries) ──────────────────────────
  static-checks:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: tsc --noEmit (full project)
        run: bun run typecheck
      - name: tsc --build (layer boundaries)
        run: bun run typecheck:layers

  # ── 2. Linting ──────────────────────────────────────────────────────────
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Biome CI
        run: bunx biome ci extensions/ skills/

  # ── 3. Architecture boundary checks (FC/IS) ─────────────────────────────
  arch:
    name: Architecture (FC/IS boundaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Arch boundary tests (core/infra/shell isolation)
        run: bun test extensions/captain/arch.test.ts
      - name: Dependency graph (dependency-cruiser)
        run: bun run arch:check

  # ── 4. Structural checks (pure bash — no install needed) ─────────────────
  structure:
    name: Structure (line-limit + co-located tests)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: File size gate (≤ 200 lines)
        run: |
          violations=$(find extensions skills -name "*.ts" ! -name "*.test.ts" | xargs wc -l 2>/dev/null | awk '$1 > 200 && $2 != "total"' | grep -v "node_modules" || true)
          if [ -n "$violations" ]; then
            echo "❌ Files exceeding 200 lines — split them (Basic_knowledge.md §Single Responsibility):"
            echo "$violations"
            exit 1
          fi
          echo "✅ All source files within 200-line limit"
      - name: Co-located tests gate
        run: |
          find extensions skills -name "*.test.ts" | while read f; do
            dir=$(dirname "$f")
            sources=$(find "$dir" -maxdepth 1 -name "*.ts" ! -name "*.test.ts" ! -name "*.d.ts" 2>/dev/null | wc -l | tr -d ' ')
            if [ "$sources" -eq 0 ]; then
              echo "❌ Orphaned test (no source files in same directory): $f"
              exit 1
            fi
          done
          echo "✅ All test files are co-located with their source"

  # ── 5. Tests + coverage ─────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [static-checks, lint, arch, structure]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Run tests with coverage threshold
        run: |
          OUTPUT=$(bun test --coverage extensions/ 2>&1)
          echo "$OUTPUT"
          LINES=$(echo "$OUTPUT" | grep "All files" | awk -F'|' '{gsub(/ /,"",$2); print $2}' | tr -d '%')
          if [ -n "$LINES" ] && [ "${LINES%%.*}" -lt 80 ]; then
            echo "❌ Line coverage ${LINES}% is below the 80% threshold (Basic_knowledge.md §TDD)"
            exit 1
          fi
          echo "✅ Coverage ${LINES}% meets the 80% threshold"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 3

  # ── 6a. Coverage badges (main only) ──────────────────────────────────────
  coverage:
    name: Coverage Badges
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Parse coverage and update README badges
        run: |
          COVERAGE=$(bun test --coverage extensions/ 2>&1)
          echo "$COVERAGE"
          LINES=$(echo "$COVERAGE"   | grep "All files" | awk -F'|' '{gsub(/ /,"",$2); print $2}')
          BRANCHES=$(echo "$COVERAGE" | grep "All files" | awk -F'|' '{gsub(/ /,"",$3); print $3}')

          color() {
            local pct=${1//%/}
            pct=${pct%%.*}
            if   [ "${pct:-0}" -ge 80 ]; then echo "brightgreen"
            elif [ "${pct:-0}" -ge 60 ]; then echo "yellow"
            else echo "red"
            fi
          }

          LINE_COLOR=$(color "$LINES")
          BRANCH_COLOR=$(color "$BRANCHES")
          LINE_ENCODED=$(echo "$LINES" | sed 's/%/%25/')
          BRANCH_ENCODED=$(echo "$BRANCHES" | sed 's/%/%25/')

          python3 - <<PYEOF
          import re, pathlib
          readme = pathlib.Path("README.md").read_text()
          line_badge   = "![Lines](https://img.shields.io/badge/lines-${LINE_ENCODED}-${LINE_COLOR})"
          branch_badge = "![Branches](https://img.shields.io/badge/branches-${BRANCH_ENCODED}-${BRANCH_COLOR})"
          readme = re.sub(r'!\[Lines\]\(https://img\.shields\.io/badge/lines-[^)]*\)',   line_badge,   readme)
          readme = re.sub(r'!\[Branches\]\(https://img\.shields\.io/badge/branches-[^)]*\)', branch_badge, readme)
          pathlib.Path("README.md").write_text(readme)
          PYEOF

          echo "Updated: lines=${LINES} (${LINE_COLOR}), branches=${BRANCHES} (${BRANCH_COLOR})"
      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update coverage badges [skip ci]" && git push)

  # ── 6b. Dependency audit ─────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun audit || true

  # ── 7. Publish to npm (main only) ────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Bump patch versions
        run: |
          npm version patch --no-git-tag-version
          for workspace in \
            extensions/clear \
            extensions/terminal \
            extensions/freecad \
            extensions/agent-loop \
            extensions/refactor-loop \
            extensions/safety-destructive-commands \
            extensions/safety-git-operations \
            extensions/safety-network-exfiltration \
            extensions/safety-path-protection \
            extensions/native-web-search \
            extensions/zellij-tab-namer; do
            npm version patch --no-git-tag-version --workspace=$workspace
          done

      - name: Publish all packages
        run: npm run publish:all
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- '**/package.json'
          git commit -m "chore: bump versions [skip ci]"
          git push
